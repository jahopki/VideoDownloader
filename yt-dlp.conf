# ==========================================
# 1. DOWNLOAD PATHS & PERFORMANCE
# ==========================================
# Final home for videos; fragments go to fast /tmp
--paths "home:/downloads"
--paths "temp:/tmp"
--cache-dir /ytdlp_cache

# Faster downloads without external tools (optimized for Alpine)
--concurrent-fragments 5

# ==========================================
# 2. FORMATTING (APPLE TV & PLEX OPTIMIZED)
# ==========================================
# Happy Path: 2160p (4K) AV1 (av01) -> H.265 (hevc) -> Anything else
# Don't convert the audio or else things can (and will) get ugly
#--format-sort "res:2160,vcodec:av01,vcodec:hevc,acodec:m4a"
--format-sort "res:2160,vcodec:av01,vcodec:hevc"

# Merge to MP4 (Safest for AV1 and fully supported by Plex/Infuse)
#--merge-output-format mkv
--merge-output-format mp4

# ==========================================
# 3. PLEX MUSIC VIDEO ORGANIZATION
# ==========================================
# Path logic: /Artist (or Uploader)/Song Title - video.mp4
--output "%(artist|uploader)s/%(title)s - video.mp4"

# Force cleanup of filenames for better cross-platform compatibility
#--restrict-filenames

# ==========================================
# 4. METADATA & ANTI-BLOCKING
# ==========================================
# Embed everything for Plex recognition (Requires AtomicParsley in Dockerfile)
--embed-metadata
--embed-thumbnail
--embed-chapters

# Attempt to "smart guess" artist if tags are missing
--parse-metadata "title:%(artist)s - %(title)s"

# Mimic a browser to avoid 403 Forbidden errors
--extractor-args "youtube:player-client=web_embedded,web,tv"

# ==========================================
# 5. ARCHIVING (DON'T DOWNLOAD TWICE)
# ==========================================
# Keep a record of downloaded IDs in your Plex folder
#--download-archive /downloads/archive.txt
# if an error is encountered, skip the URL and move to the next one; don't quit
--ignore-errors

