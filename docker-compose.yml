################################################################################
# Execute with "docker compose run --rm yt-dlp --batch-file urls.txt"
# to run against the URLs in the batch-file.
#
# Or "docker compose run --rm yt-dlp [URL]"
# to run it against a single URL
#
# To build the image, execute "docker compose build yt-dlp"
#
# Notice that the "yt-dlp" bit is the service named "yt-dlp" in this compose file
################################################################################
services:
  yt-dlp:
    # Build the image using the local Dockerfile (which includes Deno)
    image: my-local/yt-dlp-audio-video:latest
    build: .
    container_name: yt-dlp-downloader
    
    user: "1000:1000"

    volumes:
      # Mount the current directory as the workspace
      - .:/workspace
      
      # The configuration file for yt-dlp preferences
      - ./yt-dlp.conf:/etc/yt-dlp.conf

    # Creates a 4GB RAM disk for fast fragment merging during downloads
    tmpfs:
      - /tmp:rw,size=4G,mode=1777
      
    # Security: Prevents the container from running with unnecessary privileges
    security_opt:
      - no-new-privileges:true

